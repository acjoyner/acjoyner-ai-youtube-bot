<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #f0f2f5; }
        .header { background: #1a1a2e; color: white; padding: 1.2em 2em; display: flex; align-items: center; gap: 1em; }
        .header h1 { margin: 0; font-size: 1.2em; }
        .header a { color: #a5b4fc; font-size: 0.85em; margin-left: auto; text-decoration: none; }
        .container { padding: 2em; max-width: 900px; margin: 0 auto; }
        .content-box { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 2em; white-space: pre-wrap; font-size: 0.95em; line-height: 1.7; }
        .copy-btn { display: inline-block; margin-bottom: 1em; padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 0.9em; font-weight: 600; }
    </style>
</head>
<body>
<div class="header">
    <div>🎬</div>
    <h1>{{ title }}</h1>
    <a href="/">← Back to Pipeline</a>
</div>
<div class="container">
    <button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('content').innerText)">Copy to Clipboard</button>
    <div class="content-box" id="content">{{ content }}</div>
</div>
</body>
</html>
